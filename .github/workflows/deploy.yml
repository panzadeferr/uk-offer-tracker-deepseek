name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions at workflow level — required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: RUN ALL TESTS ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── TEST 1: JS Syntax Check ──
      - name: JS Syntax Check (app.html)
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('app.html')) { console.log('⏭️ app.html not found, skipping'); process.exit(0); }
            const html = fs.readFileSync('app.html', 'utf8');
            const m = html.match(/<script>([\s\S]*?)<\/script>/);
            if (!m) { console.log('⏭️ No inline script found'); process.exit(0); }
            try { new Function(m[1]); console.log('✅ app.html JS syntax OK'); }
            catch(e) { console.log('❌ JS SYNTAX ERROR:', e.message); process.exit(1); }
          "
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('app.html')) process.exit(0);
            const html = fs.readFileSync('app.html', 'utf8');
            const forbidden = ['YOUR_BREVO_API_KEY', 'RAILWAY_URL_HERE', 'xkeysib-c7e091d246f55dba71a3214c812d68c57c3c8835b08c35f68e4919bbc960eb78'];
            let ok = true;
            forbidden.forEach(s => { if (html.includes(s)) { console.log('❌ Forbidden string found:', s); ok = false; } });
            if (!ok) process.exit(1);
            console.log('✅ No forbidden strings found');
          "
          if [ -f "syntax-check.mjs" ]; then
            node syntax-check.mjs
          else
            echo "⚠️ syntax-check.mjs not found, using inline checks only"
          fi

      # ── TEST 2: Check required files exist ──
      - name: Check required files exist
        run: |
          echo "Checking required files..."
          for file in index.html app.html sw.js manifest.json; do
            if [ ! -f "$file" ]; then
              echo "❌ MISSING: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done
          echo "✅ All required files present."

      # ── TEST 3: Check no exposed secrets ──
      - name: Check no exposed secrets
        run: |
          echo "Scanning for exposed secrets..."
          if grep -r "xkeysib-" index.html app.html 2>/dev/null; then
            echo "❌ EXPOSED BREVO KEY found!"
            exit 1
          fi
          echo "✅ No exposed secrets found."

      # ── TEST 4: Validate manifest.json ──
      - name: Validate manifest.json
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            ['name','short_name','start_url','display','icons'].forEach(k => {
              if (!m[k]) { console.log('❌ Missing:', k); process.exit(1); }
              console.log('✅', k);
            });
            console.log('✅ manifest.json valid');
          "

      - name: All tests passed
        run: echo "✅ All checks passed — deploying..."

  # ── JOB 2: DEPLOY TO GITHUB PAGES ────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployed
        run: echo "✅ Live at ${{ steps.deployment.outputs.page_url }}"
