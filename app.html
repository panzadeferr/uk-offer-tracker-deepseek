<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Money Hunters UK | Daily Money Tool</title>
  <meta name="theme-color" content="#0b0f14">
  <meta name="description" content="Mobile-first UK money-making offer tracker with progress, pending payouts, earnings, and cashback stacks.">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Money Hunters">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style>
    /* Basic CSS for the app - full CSS should be in components */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0b0f14;
      color: #f6f8fb;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .app-container {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 10px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #a8b4c1;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header Component -->
    <div id="header-container"></div>
    
    <!-- Main Content Area -->
    <main>
      <!-- Home View -->
      <div id="home-view-container" class="view active"></div>
      
      <!-- Offers View -->
      <div id="offers-view-container" class="view"></div>
      
      <!-- Stack View -->
      <div id="stack-view-container" class="view"></div>
      
      <!-- Progress View -->
      <div id="progress-view-container" class="view"></div>
      
      <!-- Community View -->
      <div id="community-view-container" class="view"></div>
    </main>
    
    <!-- Footer Navigation -->
    <div id="footer-container"></div>
    
    <!-- Modals -->
    <div id="modals-container"></div>
    
    <!-- Offer Panel -->
    <div id="offer-panel" class="offer-panel">
      <div class="panel-hdr">
        <button class="panel-close" onclick="closePanel()">✕</button>
        <h3 id="panelTitle">Offer Details</h3>
      </div>
      <div class="panel-body" id="panelBody"></div>
      <div class="panel-footer">
        <button class="primary-btn panel-claim" onclick="claimOffer()">Mark as Claimed</button>
      </div>
    </div>
  </div>

  <!-- Load Components -->
  <script>
    // Load components
    async function loadComponent(id, url) {
      try {
        const response = await fetch(url);
        const html = await response.text();
        document.getElementById(id).innerHTML = html;
      } catch (error) {
        console.error(`Failed to load component ${url}:`, error);
      }
    }

    // Load all components
    async function loadComponents() {
      await loadComponent('header-container', '/components/header.html');
      await loadComponent('home-view-container', '/components/home-view.html');
      await loadComponent('offers-view-container', '/components/offers-view.html');
      await loadComponent('stack-view-container', '/components/stack-view.html');
      await loadComponent('progress-view-container', '/components/progress-view.html');
      await loadComponent('community-view-container', '/components/community-view.html');
      await loadComponent('footer-container', '/components/footer.html');
      await loadComponent('modals-container', '/components/modals.html');
      
      // Load main app JavaScript
      const script = document.createElement('script');
      script.src = '/components/app.js';
      document.body.appendChild(script);
    }

    // Initialize when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
      loadComponents();
    });

    // Basic panel functions
    function closePanel() {
      document.getElementById('offer-panel').classList.remove('open');
    }

    function claimOffer() {
      alert('Offer marked as claimed!');
      closePanel();
    }
  </script>
</body>
</html>
