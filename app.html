<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Money Hunters UK | Daily Money Tool</title>
  <meta name="theme-color" content="#0b0f14">
  <meta name="description" content="Mobile-first UK money-making offer tracker with progress, pending payouts, earnings, and cashback stacks.">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Money Hunters">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root{
      --bg:#0b0f14;
      --bg2:#11161d;
      --bg3:#171d25;
      --bg4:#202833;
      --card:#121821;
      --line:rgba(255,255,255,.07);
      --line-2:rgba(255,255,255,.1);
      --text:#f6f8fb;
      --muted:#a8b4c1;
      --muted2:#6f8091;
      --green:#1fe887;
      --green-soft:rgba(31,232,135,.12);
      --yellow:#ffcf5a;
      --yellow-soft:rgba(255,207,90,.12);
      --blue:#63a7ff;
      --blue-soft:rgba(99,167,255,.12);
      --red:#ff6b6b;
      --radius:14px;
      --radius-sm:10px;
      --fh:"Syne",sans-serif;
      --fb:"DM Sans",sans-serif;
      --shadow:0 10px 22px rgba(0,0,0,.2);
      --topbar-bg:rgba(11,15,20,.92);
    }


    /* ── LIGHT MODE ── */
    body.light{
      --bg:#f0f4f8;
      --bg2:#ffffff;
      --bg3:#e8ecf0;
      --bg4:#dde2e8;
      --card:#ffffff;
      --line:rgba(0,0,0,.09);
      --line-2:rgba(0,0,0,.14);
      --text:#0d1117;
      --muted:#374151;
      --muted2:#6b7280;
      --green:#059652;
      --green-soft:rgba(5,150,82,.1);
      --yellow:#b45309;
      --yellow-soft:rgba(180,83,9,.1);
      --blue:#1d56b0;
      --blue-soft:rgba(29,86,176,.1);
      --red:#dc2626;
      --shadow:0 2px 16px rgba(0,0,0,.1);
      --topbar-bg:rgba(240,244,248,.96);
    }
    body.light{ background:#f0f4f8; }

    /* Light mode element overrides */
    body.light .topbar{border-bottom:1px solid rgba(0,0,0,.1)}
    body.light .card{background:#fff;border-color:rgba(0,0,0,.08);box-shadow:0 1px 8px rgba(0,0,0,.06)}
    body.light .offer-card{background:#fff;border-color:rgba(0,0,0,.09)}
    body.light .offer-card.completed{background:rgba(5,150,82,.05);border-color:rgba(5,150,82,.2)}
    body.light .offer-card.pending{background:rgba(180,83,9,.05);border-color:rgba(180,83,9,.2)}
    body.light .stat{background:#fff;border-color:rgba(0,0,0,.08)}
    body.light .battle-row{background:#fff}
    body.light .battle-row:active{background:#f5f7fa}
    body.light .battle-name{color:var(--text)}
    body.light .stack-card{background:#fff}
    body.light .step-row{background:rgba(0,0,0,.03)}
    body.light .task-btn{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.09);color:var(--text)}
    body.light .secondary-btn{background:var(--bg3);color:var(--text);border-color:rgba(0,0,0,.12)}
    body.light .ghost-btn{color:var(--muted);border-color:rgba(0,0,0,.12)}
    body.light .search,body.light .filter-select,body.light .money-input,body.light .save-input,body.light .inline-input{background:#fff;border-color:rgba(0,0,0,.12);color:var(--text)}
    body.light .drawer-card{background:#fff;border-color:rgba(0,0,0,.1)}
    body.light .popup-card{background:#fff}
    body.light .auth-box{background:#fff;border-color:rgba(0,0,0,.1)}
    body.light .auth-input{background:#f5f7fa;border-color:rgba(0,0,0,.12);color:var(--text)}
    body.light .auth-tabs{background:var(--bg3)}
    body.light .auth-tab{color:var(--muted2)}
    body.light .auth-tab.on{background:#fff;color:var(--text)}
    body.light .daily-box{border-color:rgba(180,83,9,.3);background:rgba(255,207,90,.04)}
    body.light .email-capture{border-color:rgba(5,150,82,.2);background:rgba(5,150,82,.04)}
    body.light .email-input{background:#fff;border-color:rgba(0,0,0,.12);color:var(--text)}
    body.light .money-box{background:#f5f7fa;border-color:rgba(0,0,0,.08)}
    body.light .pending-row,body.light .leaderboard-row{background:rgba(0,0,0,.03)}
    body.light .list-item{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.07)}
    body.light .nav-btn{color:var(--muted2)}
    body.light .nav-btn.active{color:var(--green);background:#fff;border-color:rgba(0,0,0,.08)}
    body.light .bottom-nav{background:rgba(240,244,248,.97);border-top:1px solid rgba(0,0,0,.1)}
    body.light .icon-btn{background:var(--bg3);border-color:rgba(0,0,0,.1);color:var(--text)}
    body.light .progress-bar{background:var(--bg3)}
    body.light .streak-dot{background:var(--bg3)}
    body.light .panel-section{background:rgba(0,0,0,.03)}
    body.light .offer-panel{background:var(--bg)}
    body.light .panel-hdr{background:var(--bg2);border-color:rgba(0,0,0,.1)}
    body.light .panel-footer{background:var(--bg2);border-color:rgba(0,0,0,.1)}
    body.light .drawer-tip{background:var(--bg3)}
    body.light .code-box{background:rgba(29,86,176,.08);color:var(--blue)}
    body.light .empty{border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.02);color:var(--muted)}
    body.light .toast{background:var(--green);color:#fff}
    body.light .user-badge{background:var(--bg3);border-color:rgba(0,0,0,.1)}
    body.light .leaderboard-row.you{border-color:rgba(5,150,82,.2);background:rgba(5,150,82,.05)}
    body.light .compact-hero{background:linear-gradient(135deg,rgba(29,86,176,.08),rgba(5,150,82,.05)),#fff}
    body.light .plan-card{background:linear-gradient(145deg,rgba(180,83,9,.06),rgba(5,150,82,.04)),#fff}
    body.light .community-card{background:#fff}
    body.light .profile-card,body.light .earn-card,body.light .milestone-card{background:#fff}
    body.light .section-title{color:var(--text)}
    body.light .offer-name{color:var(--text)}
    body.light .reward{color:var(--yellow)}
    body.light .plan-amount{color:var(--yellow)}
    body.light .brand{color:var(--text)}
    body.light .brand span{color:var(--green)}
    body.light .offer-card-claim{color:#fff}
    body.light .offer-card-claim.pending-btn{background:rgba(180,83,9,.1);color:var(--yellow);border-color:rgba(180,83,9,.3)}
    body.light .offer-card-claim.done-btn{background:rgba(5,150,82,.1);color:var(--green);border-color:rgba(5,150,82,.2)}
    body.light .comparison{background:rgba(0,0,0,.08)}
    body.light .drawer-step{background:rgba(0,0,0,.03)}
    body.light .panel-step-check{background:var(--bg3);border-color:rgba(0,0,0,.15)}
    body.light .panel-save-row input{background:#fff;border-color:rgba(0,0,0,.12);color:var(--text)}
    body.light .offer-meta-badge{color:var(--muted2)}
    body.light input::placeholder,body.light textarea::placeholder{color:var(--muted2)}

    /* Theme toggle button */
    .theme-toggle{
      width:44px;height:44px;border-radius:999px;
      background:var(--bg3);color:var(--text);
      border:1px solid var(--line);cursor:pointer;
      font-size:16px;transition:.15s;flex-shrink:0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:active{transform:scale(.93)}

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--fb);
      font-size:15px;
      background:
        radial-gradient(circle at top right, rgba(99,167,255,.08), transparent 24%),
        radial-gradient(circle at top left, rgba(31,232,135,.05), transparent 26%),
        var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:100px;
      min-height:100vh;
    }
    
    /* Font loading optimization */
    @font-face {
      font-family: 'Syne';
      font-style: normal;
      font-weight: 700 800;
      font-display: swap;
      src: local('Syne'), url(https://fonts.gstatic.com/s/syne/v22/8vIS7w4qzmVxsWxjBZRjr0FKM_04uQ6tTYhE.woff2) format('woff2');
    }
    
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: local('DM Sans'), url(https://fonts.gstatic.com/s/dmsans/v15/rP2Hp2ywxg089UriCZOIHQ.woff2) format('woff2');
    }

    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{font-family:var(--fb)}

    .topbar{
      z-index:50;
      background:var(--topbar-bg);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
    }

    .topbar-inner,
    .app{
      width:min(100%, 920px);
      margin:0 auto;
      padding-left:10px;
      padding-right:10px;
    }

    .topbar-inner{padding-top:9px;padding-bottom:9px}
    .app{padding-top:8px;padding-bottom:24px;min-height:calc(100vh - 60px)}

    .brand-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
    }

    .brand{
      font-family:var(--fh);
      font-size:18px;
      line-height:1;
      letter-spacing:-.04em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .brand span{color:var(--green)}

    .top-actions{display:flex;gap:6px}

    .icon-btn,
    .nav-btn,
    .primary-btn,
    .secondary-btn,
    .mini-btn,
    .status-btn,
    .task-btn,
    .link-btn,
    .ghost-btn{
      border:0;
      cursor:pointer;
      transition:.16s ease;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border-radius:999px;
      background:var(--bg3);
      color:var(--text);
      border:1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:active,
    .nav-btn:active,
    .primary-btn:active,
    .secondary-btn:active,
    .mini-btn:active,
    .status-btn:active,
    .task-btn:active,
    .link-btn:active,
    .ghost-btn:active{
      transform:scale(.985);
      opacity:0.85;
    }
    
    .offer-card:active,
    .battle-row:active,
    .list-item:active,
    .pending-row:active,
    .leaderboard-row:active,
    .step-row:active,
    .drawer-step:active {
      background:var(--bg3);
    }
    
    .offer-card-claim:active,
    .panel-claim:active,
    .email-submit:active,
    .auth-submit:active,
    .install-btn:active {
      opacity:0.85;
      transform:scale(.97);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
    }

    .stat{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:7px 8px;
      min-width:0;
    }

    .stat-label{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted2);
      font-weight:700;
      margin-bottom:2px;
    }

    .stat-value{
      font-size:15px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .green{color:var(--green)}
    .yellow{color:var(--yellow)}
    .blue{color:var(--blue)}

    .view{display:none}
    .view.active{display:block;animation:fadeUp .18s ease;min-height:50vh}
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(4px)}
      to{opacity:1;transform:translateY(0)}
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,.008));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .section{margin-top:9px}

    .section-head{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:8px;
      margin-bottom:7px;
    }

    .section-title{
      margin:0;
      font-size:17px;
      font-family:var(--fh);
      letter-spacing:-.03em;
      line-height:1.05;
    }

    .section-note{
      color:var(--muted2);
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.07em;
      text-align:right;
    }

    .compact-hero{
      padding:11px;
      background:
        linear-gradient(135deg, rgba(99,167,255,.08), rgba(31,232,135,.04)),
        var(--card);
    }

    .compact-hero h1{
      margin:0 0 4px;
      font-family:var(--fh);
      font-size:22px;
      line-height:1.04;
      letter-spacing:-.04em;
    }

    .compact-hero p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
    }

    .plan-card{
      padding:10px;
      background:
        linear-gradient(145deg, rgba(255,207,90,.06), rgba(31,232,135,.04)),
        var(--card);
    }

    .plan-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:8px;
    }

    .plan-kicker{
      color:var(--muted2);
      font-size:9px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:3px;
    }

    .plan-amount{
      font-family:var(--fh);
      font-size:30px;
      line-height:1;
      color:var(--yellow);
    }

    .plan-copy{
      margin:0;
      max-width:130px;
      color:var(--muted);
      font-size:10px;
      line-height:1.35;
      text-align:right;
    }

    .tasks{display:grid;gap:6px}

    .task-btn{
      width:100%;
      text-align:left;
      background:rgba(255,255,255,.025);
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 10px;
      color:var(--text);
    }

    .task-top{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
      margin-bottom:2px;
    }

    .task-title{
      font-size:14px;
      font-weight:800;
      line-height:1.22;
    }

    .task-reward{
      color:var(--green);
      font-size:14px;
      font-weight:800;
      white-space:nowrap;
    }

    .task-sub{
      color:var(--muted2);
      font-size:12px;
      line-height:1.32;
    }

    .daily-box{
      padding:10px;
      background:var(--card);
      border:1px dashed rgba(255,207,90,.38);
      box-shadow:none;
    }

    .daily-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }

    .daily-title{
      display:flex;
      align-items:center;
      gap:7px;
      margin:0;
      font-family:var(--fh);
      font-size:13px;
    }

    .daily-status{
      color:var(--yellow);
      font-size:9px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.07em;
    }

    .daily-copy{
      margin:0 0 7px;
      color:var(--muted);
      font-size:10px;
      line-height:1.35;
    }

    .streak-row{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:4px;
      margin-bottom:8px;
    }

    .streak-dot{
      height:6px;
      border-radius:999px;
      background:var(--bg3);
      border:1px solid var(--line);
    }

    .streak-dot.done{
      background:linear-gradient(90deg,var(--yellow),var(--green));
    }

    .primary-btn,
    .secondary-btn{
      width:100%;
      padding:13px 14px;
      border-radius:11px;
      font-size:14px;
      font-weight:800;
      letter-spacing:-.01em;
    }

    .primary-btn{
      background:var(--green);
      color:#07130d;
    }

    .secondary-btn{
      background:var(--bg3);
      color:var(--text);
      border:1px solid var(--line);
    }

    .ghost-btn{
      width:100%;
      padding:9px 10px;
      border-radius:11px;
      background:transparent;
      color:var(--muted);
      border:1px solid var(--line);
      font-size:11px;
      font-weight:700;
    }

    .toolbar{
      display:grid;
      gap:6px;
      margin-bottom:8px;
    }

    .search,
    .filter-select,
    .save-input,
    .money-input,
    .inline-input{
      width:100%;
      background:var(--card);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:11px;
      padding:11px 13px;
      outline:none;
      font-size:15px;
    }

    .search:focus,
    .filter-select:focus,
    .save-input:focus,
    .money-input:focus,
    .inline-input:focus{
      border-color:rgba(99,167,255,.55);
      box-shadow:0 0 0 3px rgba(99,167,255,.12);
    }

    .offers-grid{display:grid;gap:7px}

    .offer-card{
      position:relative;
      overflow:hidden;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      cursor:pointer;
      transition:border-color .15s, transform .12s;
    }
    .offer-card:active{transform:scale(.99)}
    .offer-card::before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height:3px;
      background:linear-gradient(90deg,var(--green),var(--blue),var(--yellow));
    }
    .offer-card.completed{
      border-color:rgba(31,232,135,.22);
      background:linear-gradient(180deg, rgba(31,232,135,.06), rgba(255,255,255,.01));
    }
    .offer-card.pending{
      border-color:rgba(255,207,90,.22);
      background:linear-gradient(180deg, rgba(255,207,90,.06), rgba(255,255,255,.01));
    }
    .offer-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
    .offer-card-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
    .offer-meta-badge{font-size:11px;font-weight:700;color:var(--muted2)}
    .offer-meta-dot{color:var(--muted2);font-size:10px}
    .offer-card-claim{
      width:100%;padding:12px;border:none;border-radius:11px;
      background:var(--green);color:#06120c;font-size:14px;font-weight:800;
      cursor:pointer;font-family:var(--fb);transition:.15s;
    }
    .offer-card-claim:active{transform:scale(.97)}
    .offer-card-claim.pending-btn{background:var(--yellow-soft);color:var(--yellow);border:1px solid rgba(255,207,90,.3)}
    .offer-card-claim.done-btn{background:rgba(31,232,135,.1);color:var(--green);border:1px solid rgba(31,232,135,.2)}
    .offer-progress{margin-bottom:10px;display:none}
    .offer-progress.show{display:block}

    .offer-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      margin-bottom:5px;
    }

    .offer-main{min-width:0;flex:1}

    .offer-name{
      margin:0;
      font-family:var(--fh);
      font-size:16px;
      line-height:1.06;
      letter-spacing:-.02em;
    }

    .reward{
      font-family:var(--fh);
      font-size:18px;
      color:var(--yellow);
      white-space:nowrap;
      line-height:1;
    }

    .meta-row{
      display:flex;
      flex-wrap:wrap;
      gap:4px;
      margin:5px 0 6px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:4px;
      border-radius:999px;
      padding:5px 9px;
      background:var(--bg3);
      color:var(--muted);
      border:1px solid var(--line);
      font-size:11px;
      font-weight:700;
      line-height:1;
    }

    .pill.badge{
      background:var(--green-soft);
      color:var(--green);
      border-color:transparent;
    }

    .pill.status-completed{
      background:var(--green-soft);
      color:var(--green);
      border-color:transparent;
    }

    .pill.status-pending{
      background:var(--yellow-soft);
      color:var(--yellow);
      border-color:transparent;
    }

    .desc{
      margin:0 0 6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.38;
    }

    .code-box{
      display:inline-block;
      margin-bottom:6px;
      padding:6px 9px;
      border-radius:8px;
      background:v
