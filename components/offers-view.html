<section id="view-offers" class="view">
  <section class="section">
    <div class="section-head">
      <h2 class="section-title">All Offers</h2>
      <div class="section-note" id="offerCount">0 offers</div>
    </div>

    <div class="toolbar">
      <input class="search" id="searchInput" type="text" placeholder="Search offers...">
      <select class="filter-select" id="filterSelect" aria-label="Filter offers">
        <option value="all">All offers</option>
        <option value="bank">Bank / account</option>
        <option value="invest">Invest</option>
        <option value="cashback">Cashback</option>
        <option value="gift">Gift cards</option>
        <option value="business">Business</option>
        <option value="earn">Earn online</option>
        <option value="mobile">Mobile</option>
        <option value="travel">Travel / utility</option>
        <option value="freebie">Freebies / other</option>
      </select>
    </div>

    <div class="offers-grid" id="offersGrid"></div>
  </section>
</section>
